[workspace]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "max-llm-book"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.1"

[tasks]
build-book = "cd book && mdbook build"
book = { cmd = "cd book && mdbook serve --open", depends-on = ["build-book"] }

huggingface = "python scripts/hugging-face-model.py"

# Run the completed model interactively
gpt2 = "python gpt2.py"

# Format python
fmt = "ruff format ."

# Run tests
test = "pytest tests/ -v"

[dependencies]
modular = ">=26.1.0.dev2026012100"
transformers = "*" # Use MAX's version constraint
pytorch = ">=2.8.0,<3"
numpy = ">=2.3.3,<3"
mdbook = "==0.4.52"
ruff = ">=0.14.1,<0.15"
pytest = ">=8.0.0,<9"
rich = ">=14.3.3,<15"
